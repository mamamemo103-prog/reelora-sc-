  <main class="rl-page">
    <div class="rl-wrap">
      <h1>Contact</h1>
      <p class="rl-meta">March 2026 · General questions about Reelora</p>

      <p>Connect this form to your mail service when you deploy. For privacy topics, include <strong>Privacy</strong> in the subject.</p>

      <form class="rl-form" action="#" method="post" onsubmit="return false;">
        <div>
          <label for="s">Subject</label>
          <input type="text" id="s" name="subject" autocomplete="off" placeholder="How can we help?">
        </div>
        <div>
          <label for="m">Message</label>
          <textarea id="m" name="body" placeholder="Your message"></textarea>
        </div>
        <a href="mailto:hello@reelora.com?subject=Reelora%20inquiry" class="rl-btn rl-btn--fill" style="text-decoration:none;width:fit-content">Email hello@reelora.com</a>
      </form>

      <p style="margin-top:1.25rem"><a href="index.html">← Home</a></p>
    </div>
  </main>

    <div class="rl-wrap">
